name: Build and Release SQLite ICU Extension

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:      # Allow manual triggering

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      should-release: ${{ steps.check-release.outputs.should-release }}
      icu-changed: ${{ steps.check-icu-hash.outputs.icu-changed }}
    steps:
      - name: Get latest SQLite version
        id: get-version
        run: |
          VERSION=$(curl -sSf https://www.sqlite.org/src/doc/release/VERSION)
          echo "SQLite version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          if gh release view "v${VERSION}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release v${VERSION} already exists, skipping"
            echo "should-release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release v${VERSION} not found, will build and release"
            echo "should-release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if ICU source changed
        id: check-icu-hash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.get-version.outputs.version }}
        run: |
          # Download current icu.c from the latest SQLite source
          curl -sSf -o sqlite.tar.gz "https://www.sqlite.org/src/tarball?uuid=version-${VERSION}&name=sqlite"
          tar -xzf sqlite.tar.gz sqlite/ext/icu/icu.c sqlite/ext/icu/sqliteicu.h
          CURRENT_HASH=$(sha256sum sqlite/ext/icu/icu.c sqlite/ext/icu/sqliteicu.h | sha256sum | cut -d' ' -f1)
          echo "Current ICU source hash: ${CURRENT_HASH}"

          # Fetch the hash stored in the latest release, if any
          LATEST_RELEASE=$(gh release list --repo "${{ github.repository }}" --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || true)
          PREVIOUS_HASH=""
          if [ -n "${LATEST_RELEASE}" ]; then
            PREVIOUS_HASH=$(gh release download "${LATEST_RELEASE}" \
              --repo "${{ github.repository }}" \
              --pattern "icu-checksums.txt" \
              --output - 2>/dev/null \
              | grep "^ICU_COMBINED_HASH=" | cut -d'=' -f2 || true)
          fi

          if [ -z "${PREVIOUS_HASH}" ]; then
            echo "No prior icu-checksums.txt found (bootstrap or old release), treating ICU source as changed"
            echo "icu-changed=true" >> "$GITHUB_OUTPUT"
          elif [ "${CURRENT_HASH}" != "${PREVIOUS_HASH}" ]; then
            echo "ICU source hash changed: ${PREVIOUS_HASH} -> ${CURRENT_HASH}"
            echo "icu-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "ICU source hash unchanged"
            echo "icu-changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-macos:
    needs: check-version
    if: needs.check-version.outputs.should-release == 'true' && needs.check-version.outputs.icu-changed == 'true'
    runs-on: macos-14
    steps:
      - name: Download SQLite source
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          curl -sSf -o sqlite.tar.gz "https://www.sqlite.org/src/tarball?uuid=version-${VERSION}&name=sqlite"
          tar -xzf sqlite.tar.gz

      - name: Build libicu.so (ARM64 and x86_64)
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          ICU_PREFIX="$(brew --prefix icu4c)"
          SQLITE_PREFIX="$(brew --prefix sqlite)"
          cd sqlite/ext/icu/
          for ARCH in arm64 x86_64; do
            gcc -arch "${ARCH}" -fPIC -shared icu.c \
                -I"${SQLITE_PREFIX}/include" \
                -I"${ICU_PREFIX}/include" \
                -L"${ICU_PREFIX}/lib" \
                -licuuc -licui18n -licuio \
                -undefined dynamic_lookup \
                -o libicu.so
            zip "libicu-mac-${ARCH}-${VERSION}.zip" libicu.so
          done

      - name: Upload ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: libicu-mac-arm64
          path: sqlite/ext/icu/libicu-mac-arm64-*.zip

      - name: Upload x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: libicu-mac-x86_64
          path: sqlite/ext/icu/libicu-mac-x86_64-*.zip

  build-linux-x64:
    needs: check-version
    if: needs.check-version.outputs.should-release == 'true' && needs.check-version.outputs.icu-changed == 'true'
    runs-on: ubuntu-latest  # ubuntu-latest is x64
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libicu-dev libsqlite3-dev

      - name: Download SQLite source
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          curl -sSf -o sqlite.tar.gz "https://www.sqlite.org/src/tarball?uuid=version-${VERSION}&name=sqlite"
          tar -xzf sqlite.tar.gz

      - name: Build libicu.so
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          cd sqlite/ext/icu/
          gcc -fPIC -shared icu.c \
              -I/usr/include \
              -licuuc -licui18n -licuio \
              -o libicu.so
          zip "libicu-linux-x64-${VERSION}.zip" libicu.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libicu-linux-x64
          path: sqlite/ext/icu/libicu-linux-x64-*.zip

  create-release:
    needs: [check-version, build-macos, build-linux-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate icu-checksums.txt
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          curl -sSf -o sqlite.tar.gz "https://www.sqlite.org/src/tarball?uuid=version-${VERSION}&name=sqlite"
          tar -xzf sqlite.tar.gz sqlite/ext/icu/icu.c sqlite/ext/icu/sqliteicu.h
          ICU_C_HASH=$(sha256sum sqlite/ext/icu/icu.c | cut -d' ' -f1)
          ICU_H_HASH=$(sha256sum sqlite/ext/icu/sqliteicu.h | cut -d' ' -f1)
          COMBINED_HASH=$(sha256sum sqlite/ext/icu/icu.c sqlite/ext/icu/sqliteicu.h | sha256sum | cut -d' ' -f1)
          printf 'SQLITE_VERSION=%s\nICU_C_SHA256=%s\nICU_H_SHA256=%s\nICU_COMBINED_HASH=%s\n' \
            "${VERSION}" "${ICU_C_HASH}" "${ICU_H_HASH}" "${COMBINED_HASH}" > icu-checksums.txt
          echo "Generated icu-checksums.txt:"
          cat icu-checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "SQLite ICU Extension v${VERSION}" \
            --notes "SQLite ICU loadable extension built from SQLite ${VERSION}.

          ## Downloads
          | Platform | File |
          |----------|------|
          | macOS ARM64 (Apple Silicon) | \`libicu-mac-arm64-${VERSION}.zip\` |
          | macOS x86_64 (Intel) | \`libicu-mac-x86_64-${VERSION}.zip\` |
          | Linux x64 | \`libicu-linux-x64-${VERSION}.zip\` |

          ## Usage
          Unzip and load the extension." \
            artifacts/libicu-mac-arm64/libicu-mac-arm64-${VERSION}.zip \
            artifacts/libicu-mac-x86_64/libicu-mac-x86_64-${VERSION}.zip \
            artifacts/libicu-linux-x64/libicu-linux-x64-${VERSION}.zip \
            icu-checksums.txt
